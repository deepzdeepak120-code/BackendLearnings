# ============================================
# SERVER CONFIGURATION
# ============================================
server.port=8080

# ============================================
# DATABASE CONFIGURATION (MySQL)
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/expense_tracker?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Deepak@2024!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# SQL INITIALIZATION (runs before Hibernate)
# ============================================
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-cleanup.sql
spring.sql.init.continue-on-error=true

# ============================================
# JPA / HIBERNATE CONFIGURATION
# ============================================
# update = auto create/update tables based on entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=false

# ============================================
# LOGGING
# ============================================
logging.level.com.expensetracker=DEBUG
logging.level.org.springframework.web=INFO
